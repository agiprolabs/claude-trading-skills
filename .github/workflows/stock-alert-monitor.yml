name: stock-alert-monitor

# Persistent catalyst monitor that runs OFF any Claude session, on GitHub's
# runners (which have open network egress), and POSTs new matches to Slack via
# an incoming webhook stored as the repo secret SLACK_WEBHOOK.
#
# Setup (one time):
#   Settings -> Secrets and variables -> Actions -> New repository secret
#     Name:  ALERT_WEBHOOK
#     Value: https://hooks.slack.com/services/XXX/YYY/ZZZ
#
# Trigger it by schedule (below) or manually via "Run workflow".

on:
  schedule:
    # every 15 min during US market hours (13:00-20:00 UTC ~= 9a-4p ET), Mon-Fri.
    # NOTE: GitHub may delay scheduled runs under load; cron is UTC.
    - cron: "*/15 13-20 * * 1-5"
  workflow_dispatch:
    inputs:
      strict:
        description: "Drop matches whose float/RVOL/%change can't be confirmed"
        type: boolean
        default: false
      equity:
        description: "Account equity for position sizing (USD)"
        type: string
        default: "25000"

permissions:
  contents: read

concurrency:
  group: stock-alert-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # de-dup memory carried across runs (read newest, write a fresh entry)
      - name: Restore seen-state
        uses: actions/cache@v4
        with:
          path: .cache/seen.txt
          key: stock-alert-seen-${{ github.run_id }}
          restore-keys: |
            stock-alert-seen-

      - name: Scan + alert
        env:
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
          STRICT_FLAG: ${{ (inputs.strict && '--strict') || '--no-strict' }}
          EQUITY: ${{ inputs.equity || '25000' }}
        run: |
          if [ -z "$ALERT_WEBHOOK" ]; then
            echo "::error::ALERT_WEBHOOK secret is not set — add it under Settings > Secrets > Actions"
            exit 1
          fi
          mkdir -p .cache
          # --no-strict by default so keyword+price matches still alert even when
          # the runner can't fetch float/RVOL/%change; flip via "Run workflow".
          python skills/stock-alert-monitor/monitor.py \
            --once $STRICT_FLAG \
            --equity "$EQUITY" \
            --state .cache/seen.txt \
            --webhook "$ALERT_WEBHOOK"
